databases:
  - name: clinical-trials-etl-db
    plan: basic-1gb
    diskSizeGB: 10
    databaseName: clinical_trials
    user: clinical_trials_user

services:
  # API service — serves /trials/search, /trials/export, /health, /ingest
  - type: web
    name: clinical-trials-etl-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clinical-trials-etl-db
          property: connectionString
      - key: CT_GOV_BASE_URL
        value: https://clinicaltrials.gov/api/v2/studies
      - key: BATCH_SIZE
        value: "100"
      - key: LOG_LEVEL
        value: INFO

  # Daily ingestion cron job — runs at 2 AM UTC, fetches new/updated trials
  - type: cron
    name: clinical-trials-etl-ingest
    runtime: docker
    schedule: "0 2 * * *"
    dockerfilePath: ./Dockerfile
    dockerCommand: alembic upgrade head && python -m scripts.run_ingestion --since yesterday
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clinical-trials-etl-db
          property: connectionString
      - key: CT_GOV_BASE_URL
        value: https://clinicaltrials.gov/api/v2/studies
      - key: BATCH_SIZE
        value: "100"
      - key: LOG_LEVEL
        value: INFO
