<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <!-- Gradient for the main background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- Pipeline flow gradient -->
    <linearGradient id="flow" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0.6"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- Decorative flow line -->
  <path d="M 0 200 Q 200 160 400 180 T 800 170 T 1200 190" stroke="url(#flow)" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M 0 220 Q 300 190 500 200 T 900 195 T 1200 210" stroke="url(#flow)" stroke-width="1" fill="none" opacity="0.3"/>

  <!-- Left: molecule/network icon representing clinical data -->
  <g transform="translate(80, 90)" opacity="0.9">
    <!-- Central node -->
    <circle cx="0" cy="60" r="8" fill="#3b82f6"/>
    <!-- Connected nodes -->
    <circle cx="-35" cy="25" r="5" fill="#8b5cf6"/>
    <circle cx="35" cy="25" r="5" fill="#8b5cf6"/>
    <circle cx="-35" cy="95" r="5" fill="#22c55e"/>
    <circle cx="35" cy="95" r="5" fill="#22c55e"/>
    <circle cx="0" cy="0" r="4" fill="#60a5fa"/>
    <circle cx="0" cy="120" r="4" fill="#4ade80"/>
    <!-- Connections -->
    <line x1="0" y1="60" x2="-35" y2="25" stroke="#475569" stroke-width="1.5"/>
    <line x1="0" y1="60" x2="35" y2="25" stroke="#475569" stroke-width="1.5"/>
    <line x1="0" y1="60" x2="-35" y2="95" stroke="#475569" stroke-width="1.5"/>
    <line x1="0" y1="60" x2="35" y2="95" stroke="#475569" stroke-width="1.5"/>
    <line x1="0" y1="60" x2="0" y2="0" stroke="#475569" stroke-width="1.5"/>
    <line x1="0" y1="60" x2="0" y2="120" stroke="#475569" stroke-width="1.5"/>
    <line x1="-35" y1="25" x2="0" y2="0" stroke="#334155" stroke-width="1"/>
    <line x1="35" y1="25" x2="0" y2="0" stroke="#334155" stroke-width="1"/>
    <line x1="-35" y1="95" x2="0" y2="120" stroke="#334155" stroke-width="1"/>
    <line x1="35" y1="95" x2="0" y2="120" stroke="#334155" stroke-width="1"/>
  </g>

  <!-- Title text -->
  <text x="160" y="115" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="700" fill="#f8fafc" letter-spacing="-0.5">
    Clinical Trials ETL
  </text>
  <text x="160" y="160" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="300" fill="#94a3b8" letter-spacing="0.5">
    Pipeline &amp; API
  </text>

  <!-- Subtitle / description -->
  <text x="160" y="200" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#64748b" letter-spacing="0.5">
    578K trials from ClinicalTrials.gov | PostgreSQL + FastAPI | Streaming Export | Daily Sync
  </text>

  <!-- Pipeline flow boxes -->
  <g transform="translate(160, 225)">
    <!-- CT.gov -->
    <rect x="0" y="0" width="110" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="55" y="18" font-family="monospace" font-size="11" fill="#93c5fd" text-anchor="middle">ClinicalTrials</text>

    <!-- Arrow -->
    <path d="M 118 14 L 135 14" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <!-- ETL -->
    <rect x="140" y="0" width="70" height="28" rx="6" fill="#1a3326" stroke="#22c55e" stroke-width="1"/>
    <text x="175" y="18" font-family="monospace" font-size="11" fill="#86efac" text-anchor="middle">ETL</text>

    <!-- Arrow -->
    <path d="M 218 14 L 235 14" stroke="#475569" stroke-width="1.5"/>

    <!-- PostgreSQL -->
    <rect x="240" y="0" width="90" height="28" rx="6" fill="#3b2a1a" stroke="#f59e0b" stroke-width="1"/>
    <text x="285" y="18" font-family="monospace" font-size="11" fill="#fcd34d" text-anchor="middle">PostgreSQL</text>

    <!-- Arrow -->
    <path d="M 338 14 L 355 14" stroke="#475569" stroke-width="1.5"/>

    <!-- FastAPI -->
    <rect x="360" y="0" width="80" height="28" rx="6" fill="#2d1b4e" stroke="#8b5cf6" stroke-width="1"/>
    <text x="400" y="18" font-family="monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">FastAPI</text>

    <!-- Arrow -->
    <path d="M 448 14 L 465 14" stroke="#475569" stroke-width="1.5"/>

    <!-- OpenAlex -->
    <rect x="470" y="0" width="90" height="28" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
    <text x="515" y="18" font-family="monospace" font-size="11" fill="#0f172a" text-anchor="middle" font-weight="600">OpenAlex</text>
  </g>

  <!-- Right side: OpenAlex "open A" inspired mark -->
  <g transform="translate(1060, 75)">
    <!-- Stylized open A shape -->
    <path d="M 40 130 L 70 30 L 100 130" stroke="#e2e8f0" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="52" y1="95" x2="88" y2="95" stroke="#e2e8f0" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Open gap at bottom -->
    <circle cx="40" cy="130" r="3" fill="#3b82f6"/>
    <circle cx="100" cy="130" r="3" fill="#22c55e"/>
    <!-- Small label -->
    <text x="70" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#64748b" text-anchor="middle" letter-spacing="3">OPENALEX</text>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>
</svg>
